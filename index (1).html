<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nu Alert™ Risk Scan — SYGNL Technologies™</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #C45C1A;
    --orange-light: #E8742A;
    --gold: #D4A84B;
    --dark: #0A0A0B;
    --charcoal: #111114;
    --card: #16161A;
    --border: rgba(196,92,26,0.18);
    --light: #E8E4DC;
    --muted: #6B6860;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196,92,26,0.08) 0%, transparent 60%),
      linear-gradient(rgba(196,92,26,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(196,92,26,0.02) 1px, transparent 1px);
    background-size: 100% 100%, 48px 48px, 48px 48px;
  }

  .shell {
    width: 100%;
    max-width: 420px;
    background: var(--charcoal);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    height: 92vh;
    max-height: 780px;
  }

  /* HEADER */
  .header {
    background: #0D0D10;
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), #8B3A0F);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 13px;
    color: #fff; letter-spacing: 1px;
    flex-shrink: 0;
  }

  .header-info { flex: 1; }
  .header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px;
    color: var(--light); letter-spacing: 0.3px;
  }
  .header-status {
    font-size: 10px; color: var(--green);
    margin-top: 1px;
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .linkedin-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    background: rgba(10,102,194,0.15);
    border: 1px solid rgba(10,102,194,0.3);
    border-radius: 8px;
    color: #5BA3D9;
    text-decoration: none;
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    transition: all 0.2s;
  }
  .linkedin-btn:hover { background: rgba(10,102,194,0.3); }

  .reset-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--muted);
    padding: 5px 10px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { color: var(--light); background: rgba(255,255,255,0.08); }

  /* CHAT AREA */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ENTRY STATE */
  .entry-state {
    margin: auto;
    text-align: center;
    padding: 24px 16px;
    animation: fadeIn 0.6s ease;
  }
  .entry-icon { font-size: 36px; margin-bottom: 14px; }
  .entry-tagline {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px;
    color: var(--orange);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .entry-sub { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .entry-sub strong { color: var(--light); }

  /* MESSAGES */
  .bot-msg {
    display: flex; gap: 8px; align-items: flex-end;
    animation: slideUp 0.3s ease;
  }

  .bot-bubble {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px 16px 16px 4px;
    padding: 11px 14px;
    max-width: 88%;
    font-size: 12px;
    line-height: 1.65;
    color: var(--light);
  }

  .bot-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), #8B3A0F);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; color: #fff;
    font-family: 'Syne', sans-serif;
  }

  .user-msg {
    display: flex; justify-content: flex-end;
    animation: slideUp 0.3s ease;
  }

  .user-bubble {
    background: linear-gradient(135deg, var(--orange), #A04A14);
    border-radius: 16px 16px 4px 16px;
    padding: 10px 14px;
    max-width: 80%;
    font-size: 12px;
    color: #fff;
    line-height: 1.5;
  }

  /* OPTIONS */
  .options {
    display: flex; flex-direction: column; gap: 7px;
    padding-left: 32px;
    animation: slideUp 0.4s ease;
  }

  .opt-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--light);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s;
    line-height: 1.5;
  }

  .opt-btn:hover {
    background: rgba(196,92,26,0.1);
    border-color: var(--orange);
    color: var(--orange-light);
  }

  .opt-label {
    color: var(--orange);
    font-weight: 500;
    margin-right: 8px;
  }

  /* AUDIENCE SELECTOR */
  .audience-btns {
    display: flex; gap: 8px;
    padding-left: 32px;
    animation: slideUp 0.4s ease;
  }

  .aud-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    color: var(--light);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .aud-btn:hover {
    background: rgba(196,92,26,0.12);
    border-color: var(--orange);
  }

  .aud-icon { font-size: 22px; margin-bottom: 6px; display: block; }

  /* RESULT CARD */
  .result-card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    border-left: 3px solid var(--orange);
    animation: fadeIn 0.5s ease;
    font-size: 11px;
    line-height: 1.7;
    color: var(--light);
    margin-left: 32px;
  }

  .result-card.low { border-color: var(--green); }
  .result-card.medium { border-color: var(--yellow); }
  .result-card.high { border-color: var(--red); }

  .result-label {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }

  .result-label.low { color: var(--green); }
  .result-label.medium { color: var(--yellow); }
  .result-label.high { color: var(--red); }

  .heat-map {
    margin: 12px 0;
    display: flex; flex-direction: column; gap: 5px;
  }

  .heat-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px;
  }

  .heat-label { flex: 1; color: var(--muted); }
  .heat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .heat-dot.red { background: var(--red); }
  .heat-dot.yellow { background: var(--yellow); }
  .heat-dot.green { background: var(--green); }

  .cta-row {
    display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
  }

  .cta-btn {
    flex: 1;
    min-width: 120px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }

  .cta-primary {
    background: linear-gradient(135deg, var(--orange), #8B3A0F);
    color: #fff;
  }
  .cta-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .cta-secondary {
    background: transparent;
    border: 1px solid var(--border) !important;
    color: var(--light);
  }
  .cta-secondary:hover { border-color: var(--orange) !important; color: var(--orange-light); }

  /* INPUT AREA */
  .input-area {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0;
    background: #0D0D10;
  }

  .text-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--light);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input::placeholder { color: var(--muted); }
  .text-input:focus { border-color: var(--orange); }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--orange), #8B3A0F);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); opacity: 0.9; }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* SHARE PANEL */
  .share-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-left: 32px;
    animation: fadeIn 0.5s ease;
  }

  .share-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 11px;
    color: var(--orange);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .share-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .share-btn {
    flex: 1;
    min-width: 100px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 9px 10px;
    color: var(--light);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
  }

  .share-btn:hover { border-color: var(--orange); color: var(--orange-light); }

  /* QR */
  #qr-canvas { display: block; margin: 10px auto 0; border-radius: 8px; }

  /* TYPING INDICATOR */
  .typing {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px;
    animation: fadeIn 0.3s ease;
  }
  .typing-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--orange);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* LEAKAGE INPUT */
  .leak-input-wrap {
    padding-left: 32px;
    animation: slideUp 0.3s ease;
  }

  .leak-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--light);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .leak-input:focus { border-color: var(--orange); }
  .leak-input::placeholder { color: var(--muted); }

  .leak-hint {
    font-size: 10px; color: var(--muted);
    margin-top: 6px; padding-left: 4px;
  }
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">NA</div>
    <div class="header-info">
      <div class="header-name">Nu Alert™ Risk Scan</div>
      <div class="header-status">● online now</div>
    </div>
    <div class="header-actions">
      <a href="https://www.linkedin.com/in/sharon-l-simmons-95764539" target="_blank" class="linkedin-btn">in</a>
      <button class="reset-btn" onclick="resetApp()">↺ restart</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div class="entry-state" id="entryState">
      <div class="entry-icon">📡</div>
      <div class="entry-tagline">Hidden Risk Starts at FNOL.™</div>
      <div class="entry-sub">Type <strong>AUDIT</strong> below to begin your free volatility scan.</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <input class="text-input" id="userInput" placeholder="Type AUDIT to begin..." autocomplete="off"
      onkeydown="if(event.key==='Enter') sendText()" />
    <button class="send-btn" onclick="sendText()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────

const FLEET_QUESTIONS = [
  {
    q: "How many commercial vehicles are in your fleet?",
    opts: ["1–10 vehicles", "11–50 vehicles", "51–150 vehicles", "150+ vehicles"],
    label: "Fleet Size",
    scores: [1,2,2,3]
  },
  {
    q: "When a driver has an incident, how do they report it?",
    opts: ["Call me or a dispatcher directly", "Fill out a paper form", "We have a mobile app or digital system", "Honestly… it depends on the driver"],
    label: "Intake Method",
    scores: [2,3,1,3]
  },
  {
    q: "How long after an incident does it typically take for a claim to be formally filed?",
    opts: ["Same day", "1–3 days", "4–7 days", "More than a week — sometimes we find out late"],
    label: "Time to FNOL",
    scores: [1,2,3,3]
  },
  {
    q: "Who captures incident details first?",
    opts: ["The driver (self-reports)", "A dispatcher or supervisor", "Our insurance broker or TPA", "It varies — no set process"],
    label: "First Report Owner",
    scores: [2,1,2,3]
  },
  {
    q: "Have you ever discovered important incident details AFTER a claim was filed — things that changed the outcome?",
    opts: ["Never — our intake is solid", "Occasionally — maybe once or twice", "More than I'd like to admit", "Yes — and it cost us"],
    label: "Double Failure Signal",
    scores: [1,2,3,3]
  }
];

const CARRIER_QUESTIONS = [
  {
    q: "How do fleet clients typically submit their FNOL to your organization?",
    opts: ["Online portal or digital form", "Phone call to adjuster", "Email or fax", "Varies — no standard process"],
    label: "Intake Channel",
    scores: [1,2,3,3]
  },
  {
    q: "What is your average time from FNOL submission to adjuster assignment?",
    opts: ["Under 2 hours", "Same day", "1–3 days", "3+ days or inconsistent"],
    label: "Assignment Speed",
    scores: [1,2,3,3]
  },
  {
    q: "How often do you receive incomplete or inaccurate FNOL data from fleet clients?",
    opts: ["Rarely — data is usually complete", "Occasionally — minor gaps", "Frequently — we always follow up", "Almost always — it's a real problem"],
    label: "Data Quality",
    scores: [1,2,3,3]
  },
  {
    q: "Do you currently have a pre-FNOL signal detection system in place for your fleet accounts?",
    opts: ["Yes — real-time monitoring active", "Partial — some telematics data", "No — we rely on incident reports", "We've been looking for a solution"],
    label: "Pre-Loss Detection",
    scores: [1,2,3,2]
  },
  {
    q: "Have you experienced claims where key incident data emerged after filing — changing reserve amounts or outcomes?",
    opts: ["Never — our intake process is tight", "Occasionally", "More often than we'd like", "Yes — it's a known gap we need to fix"],
    label: "Post-Filing Discovery",
    scores: [1,2,3,3]
  }
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

let phase = "entry";
let audience = null; // "fleet" | "carrier"
let currentQ = 0;
let totalScore = 0;
let answers = [];
let typing = false;

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

const chat = document.getElementById("chat");
const input = document.getElementById("userInput");

function scroll() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

function addBot(html, delay = 400) {
  return new Promise(resolve => {
    // Show typing
    const td = document.createElement("div");
    td.className = "bot-msg";
    td.innerHTML = `<div class="bot-dot">NA</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    chat.appendChild(td);
    scroll();

    setTimeout(() => {
      td.remove();
      const el = document.createElement("div");
      el.className = "bot-msg";
      el.innerHTML = `<div class="bot-dot">NA</div><div class="bot-bubble">${html}</div>`;
      chat.appendChild(el);
      scroll();
      resolve();
    }, delay);
  });
}

function addUser(text) {
  const el = document.createElement("div");
  el.className = "user-msg";
  el.innerHTML = `<div class="user-bubble">${text}</div>`;
  chat.appendChild(el);
  scroll();
}

function showAudienceSelector() {
  const el = document.createElement("div");
  el.className = "audience-btns";
  el.id = "audienceSel";
  el.innerHTML = `
    <button class="aud-btn" onclick="selectAudience('fleet', this.parentElement)">
      <span class="aud-icon">🚛</span>
      Fleet Operator
    </button>
    <button class="aud-btn" onclick="selectAudience('carrier', this.parentElement)">
      <span class="aud-icon">📋</span>
      Insurance Carrier / Broker
    </button>
  `;
  chat.appendChild(el);
  scroll();
}

function showOptions(question, index, total) {
  const letters = ["A","B","C","D"];
  const el = document.createElement("div");
  el.className = "options";
  el.id = "opts";
  el.innerHTML = question.opts.map((o,i) =>
    `<button class="opt-btn" onclick="pickOption(${i}, this.parentElement)">
      <span class="opt-label">${letters[i]}</span>${o}
    </button>`
  ).join("");
  chat.appendChild(el);
  scroll();
}

function removeOptions() {
  const o = document.getElementById("opts");
  if (o) o.remove();
}

// ─────────────────────────────────────────────
// FLOW
// ─────────────────────────────────────────────

async function startFlow() {
  const entry = document.getElementById("entryState");
  if (entry) entry.remove();

  addUser("AUDIT");
  phase = "greeting";

  await addBot("📡 Initialising Nu Alert™ Risk Scan...", 600);
  await addBot("Welcome. I'm the FNOL Volatility Screener for SYGNL Technologies™.<br><br>In 5 questions, I'll identify exactly where your risk intake is leaking.", 800);
  await addBot("First — are you a <strong>fleet operator</strong> or an <strong>insurance carrier / broker</strong>?", 700);

  showAudienceSelector();
  phase = "audience";
}

async function selectAudience(type, el) {
  el.remove();
  audience = type;
  const label = type === "fleet" ? "🚛 Fleet Operator" : "📋 Insurance Carrier / Broker";
  addUser(label);

  phase = "questions";
  currentQ = 0;
  totalScore = 0;
  answers = [];

  const qs = type === "fleet" ? FLEET_QUESTIONS : CARRIER_QUESTIONS;
  const intro = type === "fleet"
    ? "Got it. Let's look at how your fleet currently handles incident reporting and claims intake."
    : "Understood. Let's evaluate your current FNOL intake infrastructure and pre-loss signal capability.";

  await addBot(intro, 700);
  await askQuestion();
}

async function askQuestion() {
  const qs = audience === "fleet" ? FLEET_QUESTIONS : CARRIER_QUESTIONS;
  if (currentQ >= qs.length) {
    await showResult();
    return;
  }

  const q = qs[currentQ];
  const num = currentQ + 1;
  await addBot(`<span style="color:var(--orange);font-size:10px;font-family:'Syne',sans-serif;font-weight:700">Q${num} of 5 — ${q.label}</span><br><br>${q.q}`, 700);
  showOptions(q, currentQ, qs.length);
}

async function pickOption(i, el) {
  const qs = audience === "fleet" ? FLEET_QUESTIONS : CARRIER_QUESTIONS;
  const q = qs[currentQ];
  const letters = ["A","B","C","D"];

  el.remove();
  addUser(`${letters[i]} — ${q.opts[i]}`);

  totalScore += q.scores[i];
  answers.push({ label: q.label, score: q.scores[i], answer: q.opts[i] });
  currentQ++;

  await askQuestion();
}

async function showResult() {
  // Score: 5–7 low, 8–11 medium, 12–15 high
  let band, color, icon;
  if (totalScore <= 7) { band = "LOW"; color = "low"; icon = "✅"; }
  else if (totalScore <= 11) { band = "MODERATE"; color = "medium"; icon = "⚠️"; }
  else { band = "HIGH"; color = "high"; icon = "🔴"; }

  await addBot("Scan complete. Compiling your volatility profile...", 800);

  // Heat map
  const heatItems = answers.map(a => ({
    label: a.label,
    status: a.score === 1 ? "green" : a.score === 2 ? "yellow" : "red"
  }));

        <a href="https://wa.me/14734146509?text=Hi%20Sharon%2C%20I%20completed%20the%20Nu%20Alert%20Risk%20Scan%20as%20a%20carrier%20and%20would%20like%20to%20discuss%20the%20Volatility%20Audit." target="_blank" class="cta-btn cta-primary">📱 Schedule Audit Review</a>

      resultCopy = "Your FNOL intake has identifiable gaps that are creating downstream exposure. The FNOL Intake Volatility Audit™ maps exactly where your process is vulnerable — before it affects reserves and outcomes.";
      ctaHtml = `
        <a href="https://wa.me/14734146509?text=Hi%20Sharon%2C%20I%20completed%20the%20Nu%20Alert%20Risk%20Scan%20as%20a%20carrier.%20Moderate%20volatility%20detected.%20Let%27s%20talk%20audit." target="_blank" class="cta-btn cta-primary">📱 Request Audit Consult</a>

  setTimeout(() => {

// ─────────────────────────────────────────────
// INPUT HANDLER
// ─────────────────────────────────────────────

function sendText() {
  const val = input.value.trim().toUpperCase();
  if (!val) return;
  input.value = "";

  if (phase === "entry" && val === "AUDIT") {
    startFlow();
  } else if (phase === "entry") {
    addUser(val);
    addBot("Type <strong>AUDIT</strong> to begin your free volatility scan.", 400);
  }
}

// ─────────────────────────────────────────────
// SHARE ACTIONS
// ─────────────────────────────────────────────

function showQR() {
  const area = document.getElementById("qr-area");
  if (area.style.display === "none") {
    area.style.display = "block";
    const canvas = document.getElementById("qr-canvas");
    canvas.innerHTML = "";
    try {
      new QRCode(canvas, {
        text: window.location.href,
        width: 140, height: 140,
        colorDark: "#C45C1A", colorLight: "#16161A",
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      canvas.style.display = "none";
      area.innerHTML += `<div style="font-size:10px;color:var(--orange);padding:8px">QR: ${window.location.href}</div>`;
    }
    scroll();
  } else {
    area.style.display = "none";
  }
}

function copyEmbed() {
  const area = document.getElementById("embed-area");
  const code = document.getElementById("embed-code");
  if (area.style.display === "none") {
    area.style.display = "block";
    code.value = `<a href="${window.location.href}" target="_blank" style="display:inline-block;background:#C45C1A;color:#fff;padding:12px 24px;border-radius:8px;font-family:sans-serif;font-weight:700;text-decoration:none;font-size:14px">📡 Run Your Free FNOL Risk Scan</a>`;
    scroll();
  } else {
    area.style.display = "none";
  }
}

function copyEmbedNow() {
  const code = document.getElementById("embed-code");
  navigator.clipboard.writeText(code.value).then(() => {
    const btn = event.target;
    btn.textContent = "Copied ✓";
    setTimeout(() => { btn.textContent = "Copy Code"; }, 2000);
  });
}

function resetApp() {
  phase = "entry";
  audience = null;
  currentQ = 0;
  totalScore = 0;
  answers = [];
  chat.innerHTML = `
    <div class="entry-state" id="entryState">
      <div class="entry-icon">📡</div>
      <div class="entry-tagline">Hidden Risk Starts at FNOL.™</div>
      <div class="entry-sub">Type <strong>AUDIT</strong> below to begin your free volatility scan.</div>
    </div>
  `;
  input.placeholder = "Type AUDIT to begin...";
}
